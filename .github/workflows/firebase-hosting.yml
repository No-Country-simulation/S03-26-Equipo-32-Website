name: Firebase Hosting Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLEK }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY || 'dummy' }}
          VITE_AUTH_DOMAIN: ${{ secrets.VITE_AUTH_DOMAIN || 'dummy.firebaseapp.com' }}
          VITE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'dummy-project' }}
          VITE_STORAGE_BUCKET: ${{ secrets.VITE_STORAGE_BUCKET || 'dummy.appspot.com' }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.VITE_MESSAGING_SENDER_ID || '000000000000' }}
          VITE_APP_ID: ${{ secrets.VITE_APP_ID || '1:000000000000:web:dummy' }}
          VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID || 'G-DUMMY0000' }}
          VITE_IP_WHO: ${{ secrets.VITE_IP_WHO || 'dummy' }}

      - name: Deploy preview channel
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false && env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          target: prod

      - name: Deploy production
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          target: prod
